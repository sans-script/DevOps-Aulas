<app-content-window>
    <h1 class="text-3xl font-semibold text-center mb-8">Dashboard</h1>
    <div class="flex flex-col items-center justify-center gap-4">
        <div class="flex gap-4">
            <!-- Adicionando ngModel para capturar o valor do input -->
            <input [(ngModel)]="newTaskName" class="border border-gray-300 rounded-md w-56 pl-2" type="text" name=""
                placeholder="Nova Tarefa">
            <!-- Adicionando um evento de clique para chamar a função addTask() -->
            <button (click)="addTask()" class="bg-blue-600 text-white p-2 rounded-lg">Adicionar Tarefa</button>
        </div>
        <span *ngFor="let item of items"
            class="w-[550px] text-3xl flex items-center justify-between gap-3 border-b border-gray-600 pb-2"
            [ngClass]="{'line-through text-green-600': item.completed, 'text-red-600': !item.completed}">
            {{item.name}}
            <!-- Adicionando a chamada da função taskDone(item) no evento onchange -->
                <input type="checkbox" class="h-10 w-10 border border-gray-300 rounded-md" (change)="taskDone(item)">
        </span>
    </div>
</app-content-window>
